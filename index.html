<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>富邦投顧｜盤中產業熱力圖</title>

  <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    :root { 
      --fubon-blue: #004a92;
      --fubon-gold: #c5a059;
      --border:#e5e7eb; 
      --muted:#64748b; 
    }
    body { margin: 0; font-family: "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif; background: #f8fafc; color: #1e293b; }
    
    /* 標題區塊特效 */
    header { 
      padding: 40px 20px; 
      background: #fff; 
      display: flex;
      flex-direction: column;
      align-items: center; 
      justify-content: center;
      border-bottom: 1px solid var(--border);
      box-shadow: 0 4px 15px rgba(0,0,0,0.03);
    }

    .title-wrapper {
      position: relative;
      cursor: default;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .title-wrapper:hover {
      transform: scale(1.03);
    }

    h1 { 
      margin: 0; 
      font-size: 36px; 
      font-weight: 900;
      letter-spacing: 3px;
      background: linear-gradient(90deg, #004a92, #0072bc, #c5a059, #0072bc, #004a92);
      background-size: 200% auto;
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
      animation: shine 5s linear infinite;
      text-shadow: 0 10px 20px rgba(0,74,146,0.1);
    }

    @keyframes shine {
      to { background-position: 200% center; }
    }

    /* 置中動態裝飾線 */
    .title-underline {
      width: 120px;
      height: 4px;
      background: #e2e8f0;
      margin-top: 15px;
      border-radius: 10px;
      position: relative;
      overflow: hidden;
    }
    .title-underline::after {
      content: "";
      position: absolute;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, var(--fubon-blue), var(--fubon-gold), transparent);
      animation: scan 2.5s infinite;
    }
    @keyframes scan {
      0% { left: -100%; }
      100% { left: 100%; }
    }
    
    /* 左右交替閃爍的燈號與訊息 */
    #msg { 
      margin-top: 20px;
      font-size: 14px; 
      font-weight: 600; 
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ok { color: #059669 !important; }
    .err { color: #dc2626 !important; }
    
    .status-dot { 
      display: inline-block; 
      width: 8px; 
      height: 8px; 
      border-radius: 50%; 
      background: currentColor;
    }
    .dot-left { margin-right: 10px; animation: flashLeft 1s infinite; }
    .dot-right { margin-left: 10px; animation: flashRight 1s infinite; }
    
    @keyframes flashLeft { 
      0%, 49% { opacity: 1; box-shadow: 0 0 8px currentColor; } 
      50%, 100% { opacity: 0.15; box-shadow: none; } 
    }
    @keyframes flashRight { 
      0%, 49% { opacity: 0.15; box-shadow: none; } 
      50%, 100% { opacity: 1; box-shadow: 0 0 8px currentColor; } 
    }
    
    /* 圖表容器 */
    #chart { 
      height: calc(100vh - 220px); 
      background: #fff; 
      border-radius: 16px; 
      margin: 24px; 
      box-shadow: 0 15px 35px rgba(0,0,0,0.06);
      overflow: hidden; 
      border: 1px solid var(--border);
    }
    
    /* 數據清單區塊 */
    #treeView { padding: 50px 24px; background: #f1f5f9; }
    .list-header { 
      margin: 0 auto 30px; 
      max-width: 1200px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .list-title { 
      font-size: 20px; 
      color: #0f172a; 
      font-weight: 800; 
      border-left: 5px solid var(--fubon-blue);
      padding-left: 12px;
    }

    .tree-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); 
      gap: 24px; 
      max-width: 1200px;
      margin: 0 auto;
    }
    
    details { 
      background: #fff; 
      border: 1px solid var(--border); 
      border-radius: 14px; 
      padding: 16px; 
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
    }
    details:hover { 
      border-color: var(--fubon-blue);
      box-shadow: 0 10px 25px rgba(0,74,146,0.08); 
      transform: translateY(-3px);
    }
    
    /* 調整 summary 排版 */
    summary { 
      cursor: pointer; 
      font-weight: 700; 
      font-size: 16px; 
      color: #1e293b; 
      list-style: none; 
      display: flex; 
      align-items: center; 
      outline: none; 
    }
    summary::-webkit-details-marker { display: none; }
    .group-info { 
      margin-left: 10px; 
      font-size: 13px; 
      color: var(--muted); 
      font-weight: 500; 
      background: #f1f5f9;
      padding: 2px 8px;
      border-radius: 6px;
    }
    summary::after { 
      content: "+"; 
      font-size: 20px; 
      color: var(--fubon-blue); 
      transition: 0.3s; 
      margin-left: auto;
    }
    details[open] summary::after { content: "-"; transform: rotate(180deg); }
    
    .tree-stock { 
      margin-top: 12px; 
      padding: 12px 8px; 
      display: flex; 
      justify-content: space-between;
      border-bottom: 1px solid #f1f5f9; 
      font-size: 15px; 
      transition: background 0.2s;
    }
    .tree-stock:hover { background: #f8fafc; border-radius: 6px; }
    .tree-stock a { text-decoration: none; color: #334155; font-weight: 600; }
    .tree-stock a:hover { color: var(--fubon-blue); }
    
    .val-pos { color: #e11d48; font-weight: 800; } 
    .val-neg { color: #16a34a; font-weight: 800; } 
  </style>
</head>

<body>
  <header>
    <div class="title-wrapper">
      <h1>富邦投顧｜盤中產業熱力圖</h1>
    </div>
    <div class="title-underline"></div>
    <div id="msg">
      <span class="status-dot dot-left"></span>
      <span id="msg-text">系統同步中...</span>
      <span class="status-dot dot-right"></span>
    </div>
  </header>

  <div id="chart"></div>
  
  <div id="treeView">
    <div class="list-header">
      <div class="list-title">盤中資金流向監測</div>
    </div>
    <div id="treeGrid" class="tree-grid"></div>
  </div>

<script>
  const $msg = document.getElementById('msg');
  const $msgText = document.getElementById('msg-text');

  function setMsg(text, isOk=true) {
    $msgText.textContent = text;
    $msg.className = isOk ? 'ok' : 'err';
  }

  function toNumber(x) {
    if (x == null) return 0;
    const s = String(x).replace(/,/g,'').replace(/%/g,'');
    const n = parseFloat(s);
    return isNaN(n) ? 0 : n;
  }

  function pickColumn(headers, candidates) {
    const lowerHeaders = headers.map(h => String(h).toLowerCase());
    for (const c of candidates) {
      const idx = lowerHeaders.indexOf(c.toLowerCase());
      if (idx >= 0) return headers[idx];
    }
    return null;
  }

  function render(rawRows, fileUpdateTime) {
    if (!rawRows || rawRows.length === 0) return setMsg('未偵測到有效 CSV 數據', false);

    const headers = Object.keys(rawRows[0]);
    const colGroup = pickColumn(headers, ['group','sector','industry','產業','類股']);
    const colSymbol = pickColumn(headers, ['symbol','name','名稱','股票']);
    const colCode = pickColumn(headers, ['stock_code','code','代碼','股票代碼']);
    const colValue = pickColumn(headers, ['amt_1d','成交額','amount','vol']);
    const colChange = pickColumn(headers, ['chg_1d','漲跌幅','change','pct']);

    const rows = rawRows.map(r => ({
      group: String(r[colGroup] || '其他').trim(),
      symbol: String(r[colSymbol] || '').trim(),
      code: String(r[colCode] || '').trim(),
      value: Math.max(toNumber(r[colValue]), 1),
      change: toNumber(r[colChange])
    })).filter(r => r.symbol && r.code);

    const ids = ['root'], labels = ['台股產業總覽'], parents = [''], values = [0], colors = [0], hovertexts = ['台股產業總覽'];
    const groups = [...new Set(rows.map(r => r.group))];

    groups.forEach(gName => {
      const gStocks = rows.filter(r => r.group === gName);
      const gTotalValue = gStocks.reduce((sum, s) => sum + s.value, 0);
      const gWeightedChg = gStocks.reduce((sum, s) => sum + (s.change * s.value), 0) / gTotalValue;
      
      // ★ 直接四捨五入取到個位數（原始資料即為億）
      const gAmountInYi = Math.round(gTotalValue);

      ids.push(`g|${gName}`);
      labels.push(`<b>${gName}</b>`);
      parents.push('root');
      values.push(gTotalValue);
      colors.push(gWeightedChg);
      hovertexts.push(`<b>【${gName}】</b><br>成交額(億)：${gAmountInYi.toLocaleString()}<br>平均漲跌：${gWeightedChg.toFixed(2)}%`);

      gStocks.forEach(s => {
        ids.push(`s|${gName}|${s.symbol}`);
        labels.push(`${s.symbol}<br>${s.change > 0 ? '+' : ''}${s.change}%`);
        parents.push(`g|${gName}`);
        values.push(s.value);
        colors.push(s.change);
        
        // ★ 個股的數值也一併反映原始單位的文字
        hovertexts.push(`<b>${s.symbol} (${s.code})</b><br>成交額(億)：${Math.round(s.value).toLocaleString()}<br>漲跌幅：${s.change}%`);
      });
    });

    values[0] = rows.reduce((sum, r) => sum + r.value, 0);

    Plotly.newPlot('chart', [{
      type: 'treemap',
      ids, labels, parents, values,
      branchvalues: 'total',
      hovertext: hovertexts,
      hovertemplate: '%{hovertext}<extra></extra>',
      textinfo: 'label',
      marker: {
        colors,
        colorscale: [[0, '#16a34a'], [0.5, '#f1f5f9'], [1, '#e11d48']],
        cmid: 0,
        line: { width: 2, color: '#fff' }
      }
    }], { 
      margin: { l: 0, r: 0, t: 0, b: 0 },
      paper_bgcolor: 'rgba(0,0,0,0)',
      plot_bgcolor: 'rgba(0,0,0,0)'
    }, { responsive: true, displaylogo: false });

    renderList(rows, groups);
    
    setMsg(`數據連線正常｜資料更新：${fileUpdateTime}`);
  }

  function renderList(rows, groups) {
    const grid = document.getElementById('treeGrid');
    const sortedGroups = groups.sort((a, b) => {
      const sum = (g) => rows.filter(r => r.group === g).reduce((s, x) => s + x.value, 0);
      return sum(b) - sum(a);
    });

    grid.innerHTML = sortedGroups.map(g => {
      const stocks = rows.filter(r => r.group === g).sort((a,b) => b.value - a.value);
      
      const totalAmount = stocks.reduce((sum, s) => sum + s.value, 0);
      
      // ★ 直接四捨五入取到個位數（原始資料即為億）
      const amountInYi = Math.round(totalAmount);
      
      const stockHtml = stocks.map(s => {
        const c = s.change > 0 ? 'val-pos' : (s.change < 0 ? 'val-neg' : '');
        const url = `https://www.fbs.com.tw/MKT/Index?name=%EF%BC%AB%E7%B7%9A%E5%9C%96&stock=${s.code}`;
        return `<div class="tree-stock">
                  <a href="${url}" target="_blank">${s.symbol} <small style="color:#94a3b8">(${s.code})</small></a>
                  <span class="${c}">${s.change > 0 ? '+' : ''}${s.change}%</span>
                </div>`;
      }).join('');
      
      return `<details>
                <summary>
                  ${g} <span class="group-info">${stocks.length} 檔 ｜ 成交額(億): ${amountInYi.toLocaleString()}</span>
                </summary>
                ${stockHtml}
              </details>`;
    }).join('');
  }

  window.onload = () => {
    fetch('./data.csv', { cache: 'no-store' })
      .then(res => {
        if (!res.ok) throw new Error('請確認同資料夾內存有 data.csv');
        
        const lastMod = res.headers.get('Last-Modified');
        let updateTimeStr = '';
        
        if (lastMod) {
          const d = new Date(lastMod);
          updateTimeStr = d.toLocaleString('zh-TW', { hour12: false });
        } else {
          updateTimeStr = new Date().toLocaleString('zh-TW', { hour12: false }) + ' (本機載入時間)';
        }
        
        return res.text().then(text => ({ text, updateTimeStr }));
      })
      .then(({ text, updateTimeStr }) => {
        const parsed = Papa.parse(text, { header: true, skipEmptyLines: true });
        render(parsed.data, updateTimeStr);
      })
      .catch(err => setMsg(`初始化失敗: ${err.message || err}`, false));
  };
</script>
</body>
</html>
